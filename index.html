<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes</title>
    <meta name="description" content="Browse and take quizzes on various topics.">
    <link rel="stylesheet" href="global.css">
    <script src="theme.js"></script>
</head>

<body>
    <div class="root">
        <div id="app">
            <div class="idx-loading">Loading quizzes…</div>
        </div>
        <footer class="idx-footer">
            <span>Quiz App v2</span>
            <button id="update-btn" class="footer-update-btn">Check for updates</button>
        </footer>
    </div>
    <script>
        const app = document.getElementById('app');

        function escapeHtml(s) {
            if (typeof s !== 'string') return String(s ?? '');
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function init() {
            try {
                const res = await fetch('quizzes/index.json', { cache: 'no-store' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                renderIndex(data.quizzes || []);
            } catch (err) {
                app.innerHTML = `
                    <div class="idx-header">
                        <div class="idx-title">Quizzes</div>
                        <div class="idx-sub">Browse and take quizzes.</div>
                    </div>
                    <div class="idx-error">
                        Failed to load quiz index. Browsers might block local file access (file://) for security.<br>
                    </div>`;
            }
        }

        function renderIndex(quizzes) {
            if (quizzes.length === 0) {
                app.innerHTML = `
                    <div class="idx-header">
                        <div class="idx-title">Quizzes</div>
                        <div class="idx-sub">Browse and take quizzes.</div>
                    </div>
                    <div class="idx-empty">No quizzes found. Add one to <code>quizzes/</code> and update <code>quizzes/index.json</code>.</div>`;
                return;
            }

            const cards = quizzes.map(q => {
                const tags = (q.tags || []).map(t => `<span class="idx-tag">${escapeHtml(t)}</span>`).join('');
                return `<a class="idx-card" href="quiz.html#quiz=${encodeURIComponent(q.id)}">
                    <div class="idx-card-title">${escapeHtml(q.title)}</div>
                    <div class="idx-card-desc">${escapeHtml(q.description || '')}</div>
                    ${tags ? `<div class="idx-card-meta">${tags}</div>` : ''}
                </a>`;
            }).join('');

            app.innerHTML = `
                <div class="idx-header">
                    <div class="idx-title">Quizzes</div>
                    <div class="idx-sub">Pick a quiz to get started.</div>
                </div>
                <div class="idx-grid">${cards}</div>`;
        }

        init();

        // Service Worker registration & updates
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                const btn = document.getElementById('update-btn');
                if (!btn) return;

                function showUpdateBtn() {
                    btn.classList.add('update-available');
                    btn.textContent = 'Update available! Click to reload';
                    btn.disabled = false;
                }

                // If there's already a waiting worker, show the update button immediately
                if (reg.waiting) {
                    showUpdateBtn();
                }

                // Monitor for updates
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed') {
                            if (navigator.serviceWorker.controller) {
                                showUpdateBtn();
                            }
                        }
                    });
                });

                btn.addEventListener('click', () => {
                    if (btn.classList.contains('update-available')) {
                        window.location.reload();
                        return;
                    }

                    btn.disabled = true;
                    btn.textContent = 'Checking...';
                    
                    let updateFound = false;
                    const checkTimeout = setTimeout(() => {
                        if (!updateFound) {
                            btn.textContent = 'Up to date!';
                            setTimeout(() => {
                                btn.disabled = false;
                                btn.textContent = 'Check for updates';
                            }, 2000);
                        }
                    }, 1500);

                    reg.update().catch(() => {
                        btn.disabled = false;
                        btn.textContent = 'Error checking updates';
                    });
                });
            }).catch(() => {});
        }
    </script>
</body>

</html>
