<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <meta name="description" content="Take a quiz and test your knowledge.">
    <link rel="stylesheet" href="global.css">
    <script src="theme.js"></script>
</head>

<body>
    <div class="root">
        <div class="qz" id="app">
            <div class="idx-loading">Loading quiz…</div>
        </div>
        <footer class="idx-footer" id="quiz-footer">
            <span>Quiz App v2</span>
            <button id="update-btn" class="footer-update-btn">Check for updates</button>
        </footer>
    </div>
    <script>
        // =============================================================================
        // QUIZ ENGINE — loads questions from quizzes/<id>/quiz.json via ?quiz=<id>
        // =============================================================================

        const TYPE_META = {
            "mc": { label: "Multiple Choice", desc: "Select the correct answer" },
            "tf": { label: "True / False", desc: "Decide if the statement is correct" },
            "id": { label: "Fill in the Blank", desc: "Type the missing word(s)" },
            "enum": { label: "Enumeration", desc: "List all correct answers" },
            "match": { label: "Matching", desc: "Pair corresponding items" }
        };

        // Escape helpers
        function escapeHtml(s) {
            if (typeof s !== 'string') return String(s ?? '');
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        const escapeAttr = escapeHtml;

        // Normalization (shared across answer checking and display)
        const norm = s => s.trim().toLowerCase().replace(/[^a-z0-9\-\/\s]/g, '').replace(/\s+/g, ' ');
        const normVal = val => norm(val || '');

        // Answer validation
        function hasValidAnswer(q) {
            if (q.a == null) return false;
            if (q.type === 'enum') return Array.isArray(q.a) && q.a.length > 0 && q.a.some(v => v);
            if (q.type === 'match') return typeof q.a === 'object' && Object.keys(q.a).length > 0;
            if (q.type === 'tf') return q.a === 'True' || q.a === 'False';
            if (q.type === 'mc') return typeof q.a === 'string' && q.a.length > 0;
            return typeof q.a === 'string' && q.a.trim().length > 0;
        }

        let QS = [];
        let QS_ALL = [];
        let QUIZ_VERSIONS = [];
        let QUIZ_TITLE = "Quiz";
        let QUIZ_SUBTITLE = "Select question types to include, then start.";
        let QUIZ_ID = '';

        let state = {
            screen: 'loading',
            selectedVersion: null,
            selTypes: new Set(),
            selModules: new Set([1, 2, 4]),
            shuffle: true,
            infiniteMode: false,
            lmsMode: false,
            quiz: [],
            originalPool: [],
            originalTotal: 0,
            idx: 0,
            answered: false,
            skipped: false,
            userAnswer: '',
            results: [],
            showReview: false,
            justSubmitted: false,
            // LMS mode state
            lmsAnswers: {},
            lmsReviewOpen: false,
            lmsMatchingStates: {},
            lmsNavOpen: false,
        };

        // =============================================================================
        // HELPERS
        // =============================================================================

        function shuffleArr(arr) {
            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function getFilteredQS() {
            if (QUIZ_VERSIONS.length > 0 && state.selectedVersion) {
                return QS_ALL.filter(q => q.section === state.selectedVersion);
            }
            return QS_ALL;
        }

        function getAvailableTypes() {
            return [...new Set(QS.map(q => q.type))].filter(t => TYPE_META[t]);
        }

        function typeCount(t) { return QS.filter(q => q.type === t).length; }

        function typeBadge(type) {
            return TYPE_META[type] ? TYPE_META[type].label : type;
        }

        function checkAnswer(q, ua) {
            if (q.type === 'enum') {
                if (!Array.isArray(ua) || ua.length !== q.a.length) return false;
                const results = gradeEnumInputs(q, ua);
                return results.every(r => r === true);
            } else if (q.type === 'match') {
                if (!ua || typeof ua !== 'object') return false;
                const keys = Object.keys(q.a);
                if (keys.length === 0) return false;
                for (const key of keys) {
                    if (ua[key] !== q.a[key]) return false;
                }
                return true;
            } else {
                const u = norm(ua || '');
                if (norm(q.a) === u) return true;
                if (q.alt && q.alt.some(x => norm(x) === u)) return true;
                return false;
            }
        }

        function gradeEnumInputs(q, ua) {
            const results = Array(ua.length).fill(false);
            
            if (q.ordered) {
                for (let i = 0; i < ua.length; i++) {
                    const uVal = normVal(ua[i]);
                    const correctVal = normVal(q.a[i]);
                    const matchPrimary = uVal === correctVal;
                    let matchAlt = false;
                    if (q.alt && Array.isArray(q.alt[i])) {
                        matchAlt = q.alt[i].some(altOption => normVal(altOption) === uVal);
                    }
                    results[i] = matchPrimary || matchAlt;
                }
            } else {
                const matchedSlots = new Set();
                for (let i = 0; i < ua.length; i++) {
                    const uVal = normVal(ua[i]);
                    if (!uVal) continue;
                    
                    let foundMatch = false;
                    for (let j = 0; j < q.a.length; j++) {
                        if (matchedSlots.has(j)) continue;
                        
                        const correctVal = normVal(q.a[j]);
                        const matchPrimary = uVal === correctVal;
                        let matchAlt = false;
                        if (q.alt && Array.isArray(q.alt[j])) {
                            matchAlt = q.alt[j].some(altOption => normVal(altOption) === uVal);
                        }
                        if (matchPrimary || matchAlt) {
                            matchedSlots.add(j);
                            results[i] = true;
                            break;
                        }
                    }
                }
            }
            return results;
        }

        // =============================================================================
        // DATA LOADING
        // =============================================================================

        async function init() {
            const loadingTimeout = setTimeout(() => {
                const el = document.querySelector('.idx-loading');
                if (el) el.innerHTML = 'Taking too long…<br><button class="retry-load-btn" onclick="location.reload()">Retry</button>';
            }, 10000);

            const params = new URLSearchParams(window.location.search);
            QUIZ_ID = params.get('quiz');

            if (!QUIZ_ID && window.location.hash) {
                const hash = window.location.hash.substring(1);
                const hashParams = new URLSearchParams(hash);
                QUIZ_ID = hashParams.get('quiz') || hash;
            }

            if (!QUIZ_ID) {
                clearTimeout(loadingTimeout);
                showError('No quiz specified. <a href="index.html" style="color:inherit;text-decoration:underline">Go back to the index</a>.');
                return;
            }

            try {
                const res = await fetch(`quizzes/${QUIZ_ID}/quiz.json`, { cache: 'no-store' });
                clearTimeout(loadingTimeout);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                if (!data.questions || !data.questions.length) {
                    showError('This quiz has no questions.');
                    return;
                }

                QS_ALL = data.questions;
                QUIZ_VERSIONS = data.versions || [];
                QUIZ_TITLE = data.title || QUIZ_ID;
                QUIZ_SUBTITLE = data.subtitle || "Select question types to include, then start.";
                document.title = QUIZ_TITLE + " — Quiz";

                if (QUIZ_VERSIONS.length > 0) {
                    state.selectedVersion = QUIZ_VERSIONS[0].key;
                }
                QS = getFilteredQS();
                state.selTypes = new Set(getAvailableTypes());
                state.screen = 'setup';
                render();
            } catch (err) {
                clearTimeout(loadingTimeout);
                showError(`Failed to load quiz "<strong>${escapeHtml(QUIZ_ID)}</strong>". Make sure the file <code>quizzes/${escapeHtml(QUIZ_ID)}/quiz.json</code> exists and is valid JSON.<br>
                    <a href="index.html" style="color:inherit;text-decoration:underline;margin-top:8px;display:inline-block">← Back to index</a>`);
            }
        }

        function showError(msg) {
            document.getElementById('app').innerHTML = `
                <a class="quiz-back" href="index.html">← All quizzes</a>
                <div class="idx-error">${msg}</div>`;
        }

        // =============================================================================
        // QUIZ ENGINE
        // =============================================================================

        function startQuiz() {
            let pool = QS.filter(q => state.selTypes.has(q.type) && (!q.module || state.selModules.has(q.module)));
            if (state.shuffle) pool = shuffleArr(pool);
            state.originalPool = pool.map(q => ({ ...q }));
            state.originalTotal = pool.length;
            state.shuffleAtStart = state.shuffle;
            state.quiz = pool; state.idx = 0; state.answered = false; state.skipped = false;
            state.userAnswer = ''; state.results = []; state.showReview = false; state.justSubmitted = false;
            // LMS mode init
            state.lmsAnswers = {};
            state.lmsReviewOpen = false;
            state.lmsMatchingStates = {};
            state.lmsNavOpen = false;
            state.screen = 'quiz'; render();
        }

        function doSkip() {
            state.skipped = true;
            state.results.push({ q: state.quiz[state.idx], ua: '', correct: false, skipped: true });
            if (state.infiniteMode) requeueWrong();
            render();
        }

        function doNext() {
            state.justSubmitted = false;
            if (state.idx < state.quiz.length - 1) {
                state.idx++; state.answered = false; state.skipped = false;
                state.userAnswer = ''; render();
            } else {
                state.screen = 'results'; render();
            }
        }

        function requeueWrong() {
            const q = state.quiz[state.idx];
            const remaining = state.quiz.length - state.idx - 1;
            if (remaining > 0) {
                const insertAt = state.idx + 1 + Math.floor(Math.random() * remaining);
                state.quiz.splice(insertAt, 0, { ...q });
            } else {
                state.quiz.push({ ...q });
            }
        }

        // =============================================================================
        // RENDER
        // =============================================================================

        function render() {
            const app = document.getElementById('app');
            const scrollY = document.scrollingElement ? document.scrollingElement.scrollTop : 0;
            const focusId = document.activeElement ? document.activeElement.id : null;
            if (state.screen === 'setup') { app.innerHTML = renderSetup(); bindSetup(); }
            else if (state.screen === 'quiz') {
                if (state.lmsMode) {
                    if (state.lmsReviewOpen) { app.innerHTML = renderLmsReview(); bindLmsReview(); }
                    else { app.innerHTML = renderLmsQuiz(); bindLmsQuiz(); }
                } else {
                    app.innerHTML = renderQuiz(); bindQuiz();
                }
            }
            else if (state.screen === 'results') { app.innerHTML = renderResults(); bindResults(); }
            if (document.scrollingElement) document.scrollingElement.scrollTop = scrollY;
            if (focusId) { const el = document.getElementById(focusId); if (el && el.focus) el.focus(); }

            // Disable/hide theme toggle button during quiz to prevent collision and distraction
            const themeToggleBtn = document.getElementById('theme-toggle-btn');
            if (themeToggleBtn) {
                themeToggleBtn.style.display = (state.screen === 'quiz') ? 'none' : '';
            }

            // Hide footer during quiz
            const footer = document.getElementById('quiz-footer');
            if (footer) {
                footer.style.display = (state.screen === 'quiz') ? 'none' : '';
            }
        }

        // ── Setup ──

        function renderSetup() {
            const types = getAvailableTypes();
            const hasModules = QS.some(q => q.module !== undefined);
            
            // Calculate totalQ based on both selected types and modules
            const totalQ = QS.filter(q => state.selTypes.has(q.type) && (!q.module || state.selModules.has(q.module))).length;
            
            const tiles = types.map(t => {
                const meta = TYPE_META[t];
                const sel = state.selTypes.has(t);
                // Count filtered by selected modules
                const count = QS.filter(q => q.type === t && (!q.module || state.selModules.has(q.module))).length;
                return `<div class="mod-tile${sel ? ' sel' : ''}" data-type="${t}">
      <div class="mod-tile-name">${meta.label}</div>
      <div class="mod-tile-meta">${meta.desc} · ${count}q</div>
    </div>`;
            }).join('');

            let versionBlock = '';
            if (QUIZ_VERSIONS.length > 0) {
                const vTiles = QUIZ_VERSIONS.map(v => {
                    const sel = state.selectedVersion === v.key;
                    const vCount = QS_ALL.filter(q => q.section === v.key).length;
                    return `<div class="version-tile${sel ? ' sel' : ''}" data-version="${escapeAttr(v.key)}">
                        <div class="version-radio">${sel ? '<span class="version-dot-fill"></span>' : ''}</div>
                        <div class="version-info">
                            <div class="version-label">${escapeHtml(v.label)}</div>
                            <div class="version-count">${vCount} questions</div>
                        </div>
                    </div>`;
                }).join('');
                versionBlock = `<div class="section-label">Version</div>
                    <div class="version-grid">${vTiles}</div>`;
            }

            let moduleBlock = '';
            if (hasModules) {
                const availableModules = [...new Set(QS.map(q => q.module).filter(m => m !== undefined))].sort((a,b)=>a-b);
                const mLabels = {
                    1: "Module 1: HTML Forms",
                    2: "Module 2: JavaScript Basics & Logic",
                    4: "Module 4: Document Object Model (DOM)"
                };
                const mItems = availableModules.map(m => {
                    const checked = state.selModules.has(m);
                    const label = mLabels[m] || `Module ${m}`;
                    const mCount = QS.filter(q => q.module === m && state.selTypes.has(q.type)).length;
                    return `<div class="mod-tile${checked ? ' sel' : ''}" data-module="${m}">
                        <div class="mod-tile-name">${label}</div>
                        <div class="mod-tile-meta">${mCount}q</div>
                    </div>`;
                }).join('');
                
                moduleBlock = `<div class="section-label">Modules</div>
                    <div class="mod-grid">${mItems}</div>`;
            }

            return `<a class="quiz-back" href="index.html">← All quizzes</a>
  <div class="setup-title">${escapeHtml(QUIZ_TITLE)}</div>
  <div class="setup-sub">${escapeHtml(QUIZ_SUBTITLE)}</div>
  ${versionBlock}
  ${moduleBlock}
  <div class="section-label">Question Types</div>
  <div class="mod-grid">${tiles}</div>
  <div class="sel-row" style="${hasModules ? 'display:none' : ''}">
    <button class="sel-link" id="sel-all">Select all</button>
    <button class="sel-link" id="sel-none">Deselect all</button>
  </div>
  <div class="shuffle-row">
    <input type="checkbox" id="shuffle-chk" ${state.shuffle ? 'checked' : ''}>
    <label for="shuffle-chk" class="shuffle-label">Shuffle questions</label>
    <input type="checkbox" id="infinite-chk" style="margin-left:12px" ${state.infiniteMode ? 'checked' : ''} ${state.lmsMode ? 'disabled' : ''}>
    <label for="infinite-chk" class="shuffle-label" style="${state.lmsMode ? 'opacity:0.4' : ''}">Infinite mode</label>
    <input type="checkbox" id="lms-chk" style="margin-left:12px" ${state.lmsMode ? 'checked' : ''} ${state.infiniteMode ? 'disabled' : ''}>
    <label for="lms-chk" class="shuffle-label" style="${state.infiniteMode ? 'opacity:0.4' : ''}">Test mode</label>
  </div>
  <button class="start-btn" id="start-btn" ${totalQ === 0 ? 'disabled' : ''}>Start${totalQ > 0 ? ' (' + totalQ + ' questions)' : ''}</button>`;
        }

        function bindSetup() {
            document.querySelectorAll('.version-tile').forEach(el => {
                el.addEventListener('click', () => {
                    state.selectedVersion = el.dataset.version;
                    QS = getFilteredQS();
                    state.selTypes = new Set(getAvailableTypes());
                    render();
                });
            });
            document.querySelectorAll('.mod-tile[data-type]').forEach(el => {
                el.addEventListener('click', () => {
                    const t = el.dataset.type;
                    if (state.selTypes.has(t)) state.selTypes.delete(t); else state.selTypes.add(t);
                    render();
                });
            });
            document.querySelectorAll('.mod-tile[data-module]').forEach(el => {
                el.addEventListener('click', () => {
                    const m = parseInt(el.dataset.module);
                    if (state.selModules.has(m)) state.selModules.delete(m); else state.selModules.add(m);
                    render();
                });
            });
            const selAll = document.getElementById('sel-all');
            if (selAll) selAll.addEventListener('click', () => { state.selTypes = new Set(getAvailableTypes()); render(); });
            const selNone = document.getElementById('sel-none');
            if (selNone) selNone.addEventListener('click', () => { state.selTypes = new Set(); render(); });
            document.getElementById('shuffle-chk').addEventListener('change', e => { state.shuffle = e.target.checked; });
            document.getElementById('infinite-chk').addEventListener('change', e => { state.infiniteMode = e.target.checked; if (e.target.checked) { state.lmsMode = false; } render(); });
            document.getElementById('lms-chk').addEventListener('change', e => { state.lmsMode = e.target.checked; if (e.target.checked) { state.infiniteMode = false; } render(); });
            const sb = document.getElementById('start-btn');
            if (sb) sb.addEventListener('click', () => startQuiz());
        }

        // ── Quiz ──

        function renderQuiz() {
            const q = state.quiz[state.idx];
            const total = state.infiniteMode ? state.quiz.length : state.originalTotal;
            const answered = state.answered; const skipped = state.skipped;
            const done = answered || skipped;
            const pct = state.infiniteMode
                ? (state.quiz.length > 1 ? Math.round((state.idx / state.quiz.length) * 100) : 0)
                : Math.round((state.results.length / total) * 100);
            const score = state.results.filter(r => r.correct).length;

            // No-answer path: show warning and skip
            if (!hasValidAnswer(q)) {
                const noAnswerPct = state.infiniteMode
                    ? (state.quiz.length > 1 ? Math.round((state.idx / state.quiz.length) * 100) : 0)
                    : Math.round((state.results.length / (state.infiniteMode ? state.quiz.length : state.originalTotal)) * 100);
                return `<div class="prog-bar-track"><div class="prog-bar-fill" style="transform:scaleX(${noAnswerPct / 100})"></div></div>
  <div class="q-header">
    <span class="q-badge">${typeBadge(q.type)}</span>
    <span class="q-score">Score: ${score}/${state.results.filter(r => !r.noAnswer).length}${state.infiniteMode ? ' · <span class="q-remaining-badge">' + (state.quiz.length - state.idx - 1) + ' remaining</span>' : ''}</span>
  </div>
  <div class="q-card">
    <div class="q-num">Question ${state.idx + 1}${state.infiniteMode ? '' : ' of ' + total}</div>
    <div class="q-text">${escapeHtml(q.t)}</div>
    <div class="q-no-answer-warning">⚠ This question has no verified answer and cannot be scored.</div>
  </div>
  <div class="next-row"><button class="next-btn" id="next-btn">Next →</button></div>`;
            }

            let answerBlock = '';

            if (q.type === 'tf') {
                const ua = state.userAnswer; const correct = q.a;
                let tC = '', fC = '';
                if (answered) {
                    if (ua === 'True') tC = ua === correct ? 'got-it' : 'got-wrong';
                    if (ua === 'False') fC = ua === correct ? 'got-it' : 'got-wrong';
                    if (ua !== correct) { if (correct === 'True') tC = 'reveal-right'; else fC = 'reveal-right'; }
                } else if (skipped) {
                    if (correct === 'True') tC = 'reveal-right'; else fC = 'reveal-right';
                }
                answerBlock = `<div class="tf-row">
      <button class="tf-btn ${tC}" id="tf-true" aria-label="True" ${done ? 'disabled' : ''}>True</button>
      <button class="tf-btn ${fC}" id="tf-false" aria-label="False" ${done ? 'disabled' : ''}>False</button>
    </div>
    ${!done ? `
    <div style="margin-top: 12px; display: flex; justify-content: flex-start;">
      <button class="id-skip" id="tf-skip" aria-label="Skip question" style="padding: 10px 16px;">Skip</button>
    </div>` : ''}`;
            } else if (q.type === 'mc') {
                const ua = state.userAnswer; const correct = q.a;
                answerBlock = `<div class="mc-list">` + q.choices.map((c, i) => {
                    let cls = '';
                    if (answered) {
                        if (c === ua) cls = c === correct ? 'got-it' : 'got-wrong';
                        else if (c === correct) cls = 'reveal-right';
                    } else if (skipped) {
                        if (c === correct) cls = 'reveal-right';
                    }
                    return `<button class="mc-btn ${cls}" data-choice="${escapeAttr(c)}" ${done ? 'disabled' : ''}>${escapeHtml(c)}</button>`;
                }).join('') + `</div>
                ${!done ? `
                <div style="margin-top: 12px; display: flex; justify-content: flex-start;">
                    <button class="id-skip" id="mc-skip" aria-label="Skip question" style="padding: 10px 16px;">Skip</button>
                </div>` : ''}`;
            } else if (q.type === 'enum') {
                const orderText = q.ordered ? "Strict Order Required" : "Any Order Accepted";
                const orderClass = q.ordered ? "ordered" : "unordered";
                
                if (!done) {
                    answerBlock = `
                    <div class="enum-info-bar ${orderClass}">${orderText}</div>
                    <div class="enum-list">
                        ${q.a.map((_, i) => `
                            <div class="enum-row">
                                <span class="enum-num">${i + 1}</span>
                                <input class="enum-input" id="enum-inp-${i}" type="text" placeholder="Type answer ${i + 1}..." value="">
                            </div>
                        `).join('')}
                    </div>
                    <div class="enum-btns">
                        <button class="enum-sub" id="enum-sub">Submit</button>
                        <button class="enum-skip" id="enum-skip" aria-label="Skip question">Skip</button>
                    </div>`;
                } else {
                    const ua = state.userAnswer || [];
                    const graded = answered ? gradeEnumInputs(q, ua) : Array(q.a.length).fill(false);
                    
                    const matchedSlots = new Set();
                    if (!q.ordered && (answered || skipped)) {
                        for (let i = 0; i < ua.length; i++) {
                            const uVal = normVal(ua[i]);
                            if (!uVal) continue;
                            for (let j = 0; j < q.a.length; j++) {
                                if (matchedSlots.has(j)) continue;
                                const correctVal = normVal(q.a[j]);
                                const matchPrimary = uVal === correctVal;
                                let matchAlt = false;
                                if (q.alt && Array.isArray(q.alt[j])) {
                                    matchAlt = q.alt[j].some(altOption => normVal(altOption) === uVal);
                                }
                                if (matchPrimary || matchAlt) {
                                    matchedSlots.add(j);
                                    break;
                                }
                            }
                        }
                    }
                    
                    const missingAnswers = q.a.filter((_, idx) => !matchedSlots.has(idx));
                    
                    answerBlock = `
                    <div class="enum-info-bar ${orderClass}">${orderText}</div>
                    <div class="enum-list">
                        ${q.a.map((_, i) => {
                            const val = ua[i] || '';
                            const isCorrect = graded[i];
                            let cls = '';
                            let badge = '';
                            if (answered) {
                                cls = isCorrect ? 'got-it' : 'got-wrong';
                                badge = isCorrect ? '✓' : '✗';
                            } else {
                                cls = 'skipped-input';
                                badge = '✗';
                            }
                            
                            let correction = '';
                            if (q.ordered && !isCorrect) {
                                correction = `<div class="enum-correction">Expected: <strong>${escapeHtml(q.a[i])}</strong></div>`;
                            }
                            
                            return `
                            <div class="enum-row-display ${cls}">
                                <div class="enum-row-header">
                                    <span class="enum-num-badge">${i + 1}</span>
                                    <span class="enum-user-val">${val ? escapeHtml(val) : '<em>[No answer]</em>'}</span>
                                    <span class="enum-status-badge">${badge}</span>
                                </div>
                                ${correction}
                            </div>`;
                        }).join('')}
                    </div>`;
                    
                    if (!q.ordered && missingAnswers.length > 0) {
                        answerBlock += `
                        <div class="enum-missing-card">
                            <div class="enum-missing-title">Expected / missing answers:</div>
                            <div class="enum-missing-list">
                                ${missingAnswers.map(ans => `<span class="enum-missing-item">${escapeHtml(ans)}</span>`).join('')}
                            </div>
                        </div>`;
                    }
                }
            } else if (q.type === 'match') {
                if (!state.matchingState || state.matchingState.qIndex !== state.idx) {
                    const left = Object.keys(q.a);
                    const right = shuffleArr(Object.values(q.a));
                    state.matchingState = {
                        qIndex: state.idx,
                        left,
                        right,
                        pairs: {},
                        activeLeft: left[0]
                    };
                }
                
                const ms = state.matchingState;
                
                if (!done) {
                    const leftCol = ms.left.map(lk => {
                        const matchedVal = ms.pairs[lk];
                        const isActive = ms.activeLeft === lk;
                        let cls = 'match-left-item';
                        if (isActive) cls += ' active';
                        if (matchedVal) cls += ' matched';
                        
                        return `
                        <div class="${cls}" data-key="${escapeAttr(lk)}">
                            <div class="match-left-prompt">${escapeHtml(lk)}</div>
                            <div class="match-left-slot">
                                ${matchedVal 
                                    ? `<span class="match-docked-val">${escapeHtml(matchedVal)} <button class="match-clear-btn" data-key="${escapeAttr(lk)}" aria-label="Clear pairing">×</button></span>`
                                    : `<span class="match-slot-placeholder">Select option...</span>`}
                            </div>
                        </div>`;
                    }).join('');
                    
                    const rightCol = ms.right.map(rv => {
                        const isUsed = Object.values(ms.pairs).includes(rv);
                        let cls = 'match-right-item';
                        if (isUsed) cls += ' used';
                        
                        return `<button class="${cls}" data-val="${escapeAttr(rv)}" ${isUsed ? 'disabled' : ''}>${escapeHtml(rv)}</button>`;
                    }).join('');
                    
                    answerBlock = `
                    <div class="match-instructions">Tap a left prompt to select, then tap a right option to pair them.</div>
                    <div class="match-board">
                        <div class="match-col-left">
                            <div class="match-col-title">Prompts</div>
                            ${leftCol}
                        </div>
                        <div class="match-col-right">
                            <div class="match-col-title">Options</div>
                            ${rightCol}
                        </div>
                    </div>
                    <div class="match-btns">
                        <button class="match-sub" id="match-sub" ${Object.keys(ms.pairs).length === ms.left.length ? '' : 'disabled'}>Submit</button>
                        <button class="match-skip" id="match-skip" aria-label="Skip question">Skip</button>
                    </div>`;
                } else {
                    const ua = state.userAnswer || {};
                    const leftKeys = Object.keys(q.a);
                    
                    const matchesDisplay = leftKeys.map((lk, i) => {
                        const userVal = ua[lk] || '';
                        const correctVal = q.a[lk];
                        const isCorrect = userVal === correctVal;
                        
                        let cls = '';
                        let badge = '';
                        if (answered) {
                            cls = isCorrect ? 'got-it' : 'got-wrong';
                            badge = isCorrect ? '✓' : '✗';
                        } else {
                            cls = 'skipped-input';
                            badge = '✗';
                        }
                        
                        let correction = '';
                        if (!isCorrect) {
                            correction = `<div class="match-correct-reveal">Expected: <strong>${escapeHtml(correctVal)}</strong></div>`;
                        }
                        
                        return `
                        <div class="match-result-row ${cls}">
                            <div class="match-res-header">
                                <span class="match-res-prompt"><strong>${escapeHtml(lk)}</strong></span>
                                <span class="match-res-arrow">➔</span>
                                <span class="match-res-val">${userVal ? escapeHtml(userVal) : '<em>[Unmatched]</em>'}</span>
                                <span class="match-res-badge">${badge}</span>
                            </div>
                            ${correction}
                        </div>`;
                    }).join('');
                    
                    answerBlock = `
                    <div class="match-results-list">
                        ${matchesDisplay}
                    </div>`;
                }
            } else {
                answerBlock = `<div class="id-row">
      <input class="id-input" id="id-inp" type="text" placeholder="Type your answer..." ${done ? 'disabled' : ''} value="${escapeAttr(state.userAnswer || '')}">
      <div class="id-btns">
        <button class="id-sub" id="id-sub" ${done ? 'disabled' : ''}>Submit</button>
        ${!done ? `<button class="id-skip" id="id-skip" aria-label="Skip question">Skip</button>` : ''}
      </div>
    </div>`;
            }

            let feedback = '';
            if (skipped) {
                if (q.type === 'enum') {
                    feedback = `<div class="feedback skipped">Skipped. See correct answers above.</div>`;
                } else if (q.type === 'match') {
                    feedback = `<div class="feedback skipped">Skipped. See correct pairings above.</div>`;
                } else {
                    feedback = `<div class="feedback skipped">Skipped. Correct answer: <strong>${escapeHtml(q.a)}</strong></div>`;
                }
            } else if (answered) {
                const correct = checkAnswer(q, state.userAnswer);
                if (q.type === 'enum') {
                    feedback = correct
                        ? `<div class="feedback ok">Correct!</div>`
                        : `<div class="feedback no">Incorrect. See corrections above.${state.infiniteMode ? ' · This question will come back!' : ''}</div>`;
                } else if (q.type === 'match') {
                    feedback = correct
                        ? `<div class="feedback ok">Correct!</div>`
                        : `<div class="feedback no">Incorrect. See correct pairings above.${state.infiniteMode ? ' · This question will come back!' : ''}</div>`;
                } else {
                    feedback = correct
                        ? `<div class="feedback ok">Correct!</div>`
                        : `<div class="feedback no">Incorrect. Correct answer: <strong>${escapeHtml(q.a)}</strong>${state.infiniteMode ? ' · This question will come back!' : ''}</div>`;
                }
            }

            const isLast = state.idx >= state.quiz.length - 1 && done;
            const nextLabel = isLast ? 'See results' : 'Next';

            return `<div class="prog-bar-track"><div class="prog-bar-fill" style="transform:scaleX(${pct / 100})"></div></div>
  <div class="q-header">
    <span class="q-badge">${typeBadge(q.type)}</span>
    <span class="q-score">Score: ${score}/${state.results.filter(r => !r.noAnswer).length}${state.infiniteMode ? ' · <span class="q-remaining-badge">' + (state.quiz.length - state.idx - 1) + ' remaining</span>' : ''}</span>
  </div>
  <div class="q-card">
    <div class="q-num">Question ${state.idx + 1}${state.infiniteMode ? '' : ' of ' + total}</div>
    <div class="q-text">${escapeHtml(q.t)}</div>
    ${answerBlock}
    ${feedback}
  </div>
  ${done ? `<div class="next-row"><button class="next-btn" id="next-btn">${nextLabel} →</button></div>` : ''}`;
        }

        function bindQuiz() {
            const q = state.quiz[state.idx];
            const done = state.answered || state.skipped;

            // No-answer questions: only wire the Next button
            if (!hasValidAnswer(q)) {
                const nb = document.getElementById('next-btn');
                if (nb) nb.addEventListener('click', () => {
                    state.results.push({ q, ua: '', correct: false, skipped: false, noAnswer: true });
                    doNext();
                });
                return;
            }

            if (q.type === 'tf' && !done) {
                ['tf-true', 'tf-false'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.addEventListener('click', () => {
                        const val = id === 'tf-true' ? 'True' : 'False';
                        const correct = val === q.a;
                        state.userAnswer = val; state.answered = true;
                        state.results.push({ q, ua: val, correct, skipped: false });
                        if (state.infiniteMode && !correct) requeueWrong();
                        render();
                    });
                });
                
                const skp = document.getElementById('tf-skip');
                if (skp) skp.addEventListener('click', () => doSkip());
            }

            if (q.type === 'mc' && !done) {
                document.querySelectorAll('.mc-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const val = btn.dataset.choice;
                        const correct = val === q.a;
                        state.userAnswer = val; state.answered = true;
                        state.results.push({ q, ua: val, correct, skipped: false });
                        if (state.infiniteMode && !correct) requeueWrong();
                        render();
                    });
                });
                
                const skp = document.getElementById('mc-skip');
                if (skp) skp.addEventListener('click', () => doSkip());
            }

            if (q.type === 'enum' && !done) {
                const sub = document.getElementById('enum-sub');
                const skp = document.getElementById('enum-skip');
                
                q.a.forEach((_, i) => {
                    const inp = document.getElementById(`enum-inp-${i}`);
                    if (inp) {
                        inp.addEventListener('keydown', e => {
                            if (e.key === 'Enter') submit();
                        });
                    }
                });
                
                if (sub) sub.addEventListener('click', submit);
                if (skp) skp.addEventListener('click', () => doSkip());
                
                function submit() {
                    const vals = q.a.map((_, i) => {
                        const inp = document.getElementById(`enum-inp-${i}`);
                        return inp ? inp.value.trim() : '';
                    });
                    
                    if (vals.every(v => v === '')) return;
                    
                    const correct = checkAnswer(q, vals);
                    state.userAnswer = vals; state.answered = true; state.justSubmitted = true;
                    state.results.push({ q, ua: vals, correct, skipped: false });
                    if (state.infiniteMode && !correct) requeueWrong();
                    render();
                }
                
                const firstInp = document.getElementById('enum-inp-0');
                if (firstInp) firstInp.focus();
            }

            if (q.type === 'match' && !done) {
                const ms = state.matchingState;
                const sub = document.getElementById('match-sub');
                const skp = document.getElementById('match-skip');
                
                document.querySelectorAll('.match-left-item').forEach(el => {
                    el.addEventListener('click', e => {
                        if (e.target.classList.contains('match-clear-btn')) return;
                        ms.activeLeft = el.dataset.key;
                        render();
                    });
                });
                
                document.querySelectorAll('.match-clear-btn').forEach(btn => {
                    btn.addEventListener('click', e => {
                        e.stopPropagation();
                        const key = btn.dataset.key;
                        delete ms.pairs[key];
                        ms.activeLeft = key;
                        render();
                    });
                });
                
                document.querySelectorAll('.match-right-item').forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (!ms.activeLeft) return;
                        const val = btn.dataset.val;
                        ms.pairs[ms.activeLeft] = val;
                        
                        const nextUnmatched = ms.left.find(lk => !ms.pairs[lk]);
                        ms.activeLeft = nextUnmatched || null;
                        
                        render();
                    });
                });
                
                if (sub) sub.addEventListener('click', submit);
                if (skp) skp.addEventListener('click', () => doSkip());
                
                function submit() {
                    if (Object.keys(ms.pairs).length !== ms.left.length) return;
                    
                    const correct = checkAnswer(q, ms.pairs);
                    state.userAnswer = ms.pairs; state.answered = true; state.justSubmitted = true;
                    state.results.push({ q, ua: ms.pairs, correct, skipped: false });
                    if (state.infiniteMode && !correct) requeueWrong();
                    render();
                }
            }

            if (q.type === 'id') {
                const inp = document.getElementById('id-inp');
                const sub = document.getElementById('id-sub');
                const skp = document.getElementById('id-skip');
                if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
                if (sub) sub.addEventListener('click', submit);
                if (skp) skp.addEventListener('click', () => doSkip());
                function submit() {
                    const val = (inp ? inp.value : '') || '';
                    if (!val.trim()) return;
                    const correct = checkAnswer(q, val);
                    state.userAnswer = val; state.answered = true; state.justSubmitted = true;
                    state.results.push({ q, ua: val, correct, skipped: false });
                    if (state.infiniteMode && !correct) requeueWrong();
                    render();
                }
                if (!done && inp) inp.focus();
            }

            const nb = document.getElementById('next-btn');
            if (nb) nb.addEventListener('click', () => {
                doNext();
            });
        }

        // ── LMS Quiz Mode ──

        function lmsHasAnswer(idx) {
            const a = state.lmsAnswers[idx];
            if (a === undefined || a === null) return false;
            if (typeof a === 'string') return a.trim().length > 0;
            if (Array.isArray(a)) return a.some(v => v && v.trim());
            if (typeof a === 'object') return Object.keys(a).length > 0;
            return false;
        }

        function renderLmsAnswerBlock(q, idx) {
            const saved = state.lmsAnswers[idx];

            if (q.type === 'tf') {
                const sel = saved || '';
                return `<div class="tf-row">
                    <button class="tf-btn ${sel === 'True' ? 'got-it' : ''}" id="lms-tf-true">True</button>
                    <button class="tf-btn ${sel === 'False' ? 'got-it' : ''}" id="lms-tf-false">False</button>
                </div>`;
            }

            if (q.type === 'mc') {
                const sel = saved || '';
                return `<div class="mc-list">${q.choices.map(c =>
                    `<button class="mc-btn ${c === sel ? 'got-it' : ''}" data-choice="${escapeAttr(c)}">${escapeHtml(c)}</button>`
                ).join('')}</div>`;
            }

            if (q.type === 'enum') {
                const vals = saved || [];
                const orderText = q.ordered ? "Strict Order Required" : "Any Order Accepted";
                const orderClass = q.ordered ? "ordered" : "unordered";
                return `
                    <div class="enum-info-bar ${orderClass}">${orderText}</div>
                    <div class="enum-list">
                        ${q.a.map((_, i) => `
                            <div class="enum-row">
                                <span class="enum-num">${i + 1}</span>
                                <input class="enum-input" id="lms-enum-inp-${i}" type="text" placeholder="Type answer ${i + 1}..." value="${escapeAttr(vals[i] || '')}">
                            </div>
                        `).join('')}
                    </div>`;
            }

            if (q.type === 'match') {
                if (!state.lmsMatchingStates[idx]) {
                    const left = Object.keys(q.a);
                    const right = shuffleArr(Object.values(q.a));
                    state.lmsMatchingStates[idx] = { left, right, pairs: {}, activeLeft: left[0] };
                }
                // Restore pairs from lmsAnswers if present
                const ms = state.lmsMatchingStates[idx];
                if (saved && typeof saved === 'object' && Object.keys(saved).length > 0) {
                    ms.pairs = { ...saved };
                }

                const leftCol = ms.left.map(lk => {
                    const matchedVal = ms.pairs[lk];
                    const isActive = ms.activeLeft === lk;
                    let cls = 'match-left-item';
                    if (isActive) cls += ' active';
                    if (matchedVal) cls += ' matched';
                    return `
                    <div class="${cls}" data-key="${escapeAttr(lk)}">
                        <div class="match-left-prompt">${escapeHtml(lk)}</div>
                        <div class="match-left-slot">
                            ${matchedVal
                                ? `<span class="match-docked-val">${escapeHtml(matchedVal)} <button class="match-clear-btn" data-key="${escapeAttr(lk)}" aria-label="Clear pairing">×</button></span>`
                                : `<span class="match-slot-placeholder">Select option...</span>`}
                        </div>
                    </div>`;
                }).join('');

                const rightCol = ms.right.map(rv => {
                    const isUsed = Object.values(ms.pairs).includes(rv);
                    let cls = 'match-right-item';
                    if (isUsed) cls += ' used';
                    return `<button class="${cls}" data-val="${escapeAttr(rv)}" ${isUsed ? 'disabled' : ''}>${escapeHtml(rv)}</button>`;
                }).join('');

                return `
                <div class="match-instructions">Tap a left prompt to select, then tap a right option to pair them.</div>
                <div class="match-board">
                    <div class="match-col-left">
                        <div class="match-col-title">Prompts</div>
                        ${leftCol}
                    </div>
                    <div class="match-col-right">
                        <div class="match-col-title">Options</div>
                        ${rightCol}
                    </div>
                </div>`;
            }

            // Default: identification / fill-in
            return `<div class="id-row">
                <input class="id-input" id="lms-id-inp" type="text" placeholder="Type your answer..." value="${escapeAttr(saved || '')}">
            </div>`;
        }

        function renderLmsQuiz() {
            const q = state.quiz[state.idx];
            const total = state.quiz.length;
            const answeredCount = state.quiz.filter((_, i) => lmsHasAnswer(i)).length;
            const pct = Math.round((answeredCount / total) * 100);

            const navItems = state.quiz.map((_, i) => {
                const isActive = i === state.idx;
                const isAnswered = lmsHasAnswer(i);
                let cls = 'lms-nav-item';
                if (isActive) cls += ' active';
                else if (isAnswered) cls += ' answered';
                return `<button class="${cls}" data-nav="${i}">${i + 1}</button>`;
            }).join('');

            const answerBlock = renderLmsAnswerBlock(q, state.idx);

            return `<div class="prog-bar-track"><div class="prog-bar-fill" style="transform:scaleX(${pct / 100})"></div></div>
  <div class="q-header">
    <span class="q-badge">${typeBadge(q.type)}</span>
    <span class="q-score">Question ${state.idx + 1} of ${total}</span>
  </div>
  <div class="q-card">
    <div class="q-num">Question ${state.idx + 1} of ${total}</div>
    <div class="q-text">${escapeHtml(q.t)}</div>
    ${answerBlock}
  </div>
  <div class="lms-controls">
    <button class="lms-prev-btn" id="lms-prev" ${state.idx === 0 ? 'disabled' : ''}>← Prev</button>
    <button class="lms-complete-btn" id="lms-complete">Review \u0026 Complete</button>
    <button class="lms-next-btn" id="lms-next" ${state.idx >= total - 1 ? 'disabled' : ''}>Next →</button>
  </div>
  <div class="lms-nav-panel">
    <button class="lms-nav-toggle" id="lms-nav-toggle">
      <span>Questions · ${answeredCount}/${total} answered</span>
      <span class="lms-nav-chevron ${state.lmsNavOpen ? 'open' : ''}">${state.lmsNavOpen ? '▼' : '▲'}</span>
    </button>
    <div class="lms-nav ${state.lmsNavOpen ? 'open' : ''}">${navItems}</div>
  </div>`;
        }

        function lmsSaveCurrentAnswer() {
            const q = state.quiz[state.idx];
            const idx = state.idx;

            if (q.type === 'tf') {
                // Already saved on click
            } else if (q.type === 'mc') {
                // Already saved on click
            } else if (q.type === 'enum') {
                const vals = q.a.map((_, i) => {
                    const inp = document.getElementById(`lms-enum-inp-${i}`);
                    return inp ? inp.value.trim() : '';
                });
                if (vals.some(v => v)) state.lmsAnswers[idx] = vals;
                else delete state.lmsAnswers[idx];
            } else if (q.type === 'match') {
                const ms = state.lmsMatchingStates[idx];
                if (ms && Object.keys(ms.pairs).length > 0) {
                    state.lmsAnswers[idx] = { ...ms.pairs };
                }
            } else {
                // id type
                const inp = document.getElementById('lms-id-inp');
                if (inp) {
                    const val = inp.value.trim();
                    if (val) state.lmsAnswers[idx] = val;
                    else delete state.lmsAnswers[idx];
                }
            }
        }

        function lmsNavigateTo(newIdx) {
            lmsSaveCurrentAnswer();
            state.idx = newIdx;
            render();
            if (document.scrollingElement) document.scrollingElement.scrollTop = 0;
        }

        function bindLmsQuiz() {
            const q = state.quiz[state.idx];

            // Nav panel toggle
            const toggle = document.getElementById('lms-nav-toggle');
            if (toggle) toggle.addEventListener('click', () => { state.lmsNavOpen = !state.lmsNavOpen; render(); });

            // Nav bubbles
            document.querySelectorAll('.lms-nav-item').forEach(btn => {
                btn.addEventListener('click', () => lmsNavigateTo(parseInt(btn.dataset.nav)));
            });

            // Prev / Next
            const prev = document.getElementById('lms-prev');
            const next = document.getElementById('lms-next');
            if (prev) prev.addEventListener('click', () => lmsNavigateTo(state.idx - 1));
            if (next) next.addEventListener('click', () => lmsNavigateTo(state.idx + 1));

            // Complete
            const complete = document.getElementById('lms-complete');
            if (complete) complete.addEventListener('click', () => {
                lmsSaveCurrentAnswer();
                state.lmsReviewOpen = true;
                render();
                if (document.scrollingElement) document.scrollingElement.scrollTop = 0;
            });

            // Answer-type specific bindings
            if (q.type === 'tf') {
                const trueBtn = document.getElementById('lms-tf-true');
                const falseBtn = document.getElementById('lms-tf-false');
                if (trueBtn) trueBtn.addEventListener('click', () => { state.lmsAnswers[state.idx] = 'True'; render(); });
                if (falseBtn) falseBtn.addEventListener('click', () => { state.lmsAnswers[state.idx] = 'False'; render(); });
            }

            if (q.type === 'mc') {
                document.querySelectorAll('.mc-btn').forEach(btn => {
                    btn.addEventListener('click', () => { state.lmsAnswers[state.idx] = btn.dataset.choice; render(); });
                });
            }

            if (q.type === 'match') {
                const ms = state.lmsMatchingStates[state.idx];
                if (ms) {
                    document.querySelectorAll('.match-left-item').forEach(el => {
                        el.addEventListener('click', e => {
                            if (e.target.classList.contains('match-clear-btn')) return;
                            ms.activeLeft = el.dataset.key;
                            render();
                        });
                    });
                    document.querySelectorAll('.match-clear-btn').forEach(btn => {
                        btn.addEventListener('click', e => {
                            e.stopPropagation();
                            const key = btn.dataset.key;
                            delete ms.pairs[key];
                            ms.activeLeft = key;
                            state.lmsAnswers[state.idx] = { ...ms.pairs };
                            render();
                        });
                    });
                    document.querySelectorAll('.match-right-item').forEach(btn => {
                        btn.addEventListener('click', () => {
                            if (!ms.activeLeft) return;
                            ms.pairs[ms.activeLeft] = btn.dataset.val;
                            const nextUnmatched = ms.left.find(lk => !ms.pairs[lk]);
                            ms.activeLeft = nextUnmatched || null;
                            state.lmsAnswers[state.idx] = { ...ms.pairs };
                            render();
                        });
                    });
                }
            }

            // Focus text inputs
            if (q.type === 'id') {
                const inp = document.getElementById('lms-id-inp');
                if (inp) inp.focus();
            }
            if (q.type === 'enum') {
                const firstInp = document.getElementById('lms-enum-inp-0');
                if (firstInp && !state.lmsAnswers[state.idx]) firstInp.focus();
            }
        }

        function lmsFormatAnswer(q, ans) {
            if (!ans) return '<span class="blank-label">[Blank]</span>';
            if (q.type === 'enum') {
                return Array.isArray(ans) ? ans.map((a, i) => `${i + 1}. ${a ? escapeHtml(a) : '<em>[blank]</em>'}`).join(', ') : escapeHtml(ans);
            }
            if (q.type === 'match') {
                return Object.entries(ans).map(([k, v]) => `${escapeHtml(k)} ➔ ${escapeHtml(v)}`).join('; ');
            }
            return escapeHtml(ans);
        }

        function renderLmsReview() {
            const total = state.quiz.length;
            const answeredCount = state.quiz.filter((_, i) => lmsHasAnswer(i)).length;
            const blankCount = total - answeredCount;

            const items = state.quiz.map((q, i) => {
                const ans = state.lmsAnswers[i];
                const hasAns = lmsHasAnswer(i);
                return `<div class="lms-review-item ${hasAns ? 'filled' : 'blank'}">
                    <div class="lms-review-num">Q${i + 1}</div>
                    <div class="lms-review-body">
                        <div class="lms-review-q">${escapeHtml(q.t)}</div>
                        <div class="lms-review-answer">${lmsFormatAnswer(q, ans)}</div>
                    </div>
                    <button class="lms-review-goto" data-goto="${i}">Edit</button>
                </div>`;
            }).join('');

            const warning = blankCount > 0
                ? `<div class="lms-warning-bar">⚠ You have ${blankCount} unanswered question${blankCount > 1 ? 's' : ''}. You can still submit, but blank answers will be marked incorrect.</div>`
                : '';

            return `<div class="lms-review-header">Review your answers</div>
  <div class="lms-review-sub">${answeredCount} of ${total} answered</div>
  ${warning}
  <div class="lms-submit-row">
    <button class="lms-submit-btn" id="lms-submit">Submit quiz</button>
    <button class="lms-back-btn" id="lms-back">← Back to questions</button>
  </div>
  <div class="lms-review-list">${items}</div>`;
        }

        function bindLmsReview() {
            document.getElementById('lms-submit').addEventListener('click', () => completeLmsQuiz());
            document.getElementById('lms-back').addEventListener('click', () => {
                state.lmsReviewOpen = false;
                render();
            });
            document.querySelectorAll('.lms-review-goto').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.lmsReviewOpen = false;
                    state.idx = parseInt(btn.dataset.goto);
                    render();
                    if (document.scrollingElement) document.scrollingElement.scrollTop = 0;
                });
            });
        }

        function completeLmsQuiz() {
            state.results = [];
            state.quiz.forEach((q, i) => {
                const ua = state.lmsAnswers[i];
                if (!hasValidAnswer(q)) {
                    state.results.push({ q, ua: ua || '', correct: false, skipped: false, noAnswer: true });
                } else if (!lmsHasAnswer(i)) {
                    state.results.push({ q, ua: '', correct: false, skipped: true });
                } else {
                    const correct = checkAnswer(q, ua);
                    state.results.push({ q, ua, correct, skipped: false });
                }
            });
            state.lmsReviewOpen = false;
            state.screen = 'results';
            render();
            if (document.scrollingElement) document.scrollingElement.scrollTop = 0;
        }

        // ── Results ──

        function renderAnswerSummary(q, ans) {
            if (!ans) return '<em>[No answer]</em>';
            if (q.type === 'enum') {
                return Array.isArray(ans) ? ans.map(a => `"${escapeHtml(a)}"`).join(', ') : escapeHtml(ans);
            }
            if (q.type === 'match') {
                return Object.entries(ans).map(([k, v]) => `${escapeHtml(k)} ➔ ${escapeHtml(v)}`).join('; ');
            }
            return escapeHtml(ans);
        }

        function renderResults() {
            const scored = state.results.filter(r => !r.noAnswer);
            const total = scored.length;
            const correct = scored.filter(r => r.correct).length;
            const skipped = scored.filter(r => r.skipped).length;
            const wrong = total - correct - skipped;
            const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
            let byType = {};
            scored.forEach(r => {
                const t = r.q.type; if (!byType[t]) byType[t] = { c: 0, t: 0 };
                byType[t].t++; if (r.correct) byType[t].c++;
            });
            const typeRows = Object.entries(byType).map(([t, s]) => `
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px">
      <span style="color:var(--color-text-primary)">${typeBadge(t)}</span>
      <span style="color:var(--color-text-secondary)">${s.c}/${s.t} (${Math.round(s.c / s.t * 100)}%)</span>
    </div>`).join('');
            let reviewItems = '';
            if (state.showReview) {
                reviewItems = `<div class="review-title">Question review</div><div class="review-list">` +
                    state.results.map((r, i) => `
      <div class="rev-item ${r.noAnswer ? 's' : r.skipped ? 's' : r.correct ? 'c' : 'w'}">
        <div class="rev-mod">${typeBadge(r.q.type)}</div>
        <div class="rev-q">Q${i + 1}: ${escapeHtml(r.q.t)}</div>
        <div class="rev-ans">${r.noAnswer
            ? '⚠ No verified answer — question not scored'
            : r.skipped 
                ? `Skipped · Answer: <strong>${renderAnswerSummary(r.q, r.q.a)}</strong>` 
                : `Your answer: <strong>${renderAnswerSummary(r.q, r.ua)}</strong>${!r.correct ? ` · Correct: <strong>${renderAnswerSummary(r.q, r.q.a)}</strong>` : ''}`}</div>
      </div>`).join('') + `</div>`;
            }
            return `<div style="color:var(--color-text-secondary);font-size:12px;margin-bottom:4px">Final score</div>
  <div class="res-big">${pct}%</div>
  <div class="res-sub">${correct} correct out of ${total} questions</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Correct</div><div class="stat-val" style="color:var(--color-text-success)">${correct}</div></div>
    <div class="stat-card"><div class="stat-label">Wrong</div><div class="stat-val" style="color:var(--color-text-danger)">${wrong}</div></div>
    <div class="stat-card"><div class="stat-label">Score</div><div class="stat-val">${pct}%</div></div>
  </div>
  <div style="margin-bottom:1rem">${typeRows}</div>
  <div class="res-btns">
    <button class="res-btn primary" id="retry-btn">Retry same questions</button>
    <button class="res-btn secondary" id="setup-btn">Back to setup</button>
    <button class="res-btn secondary" id="index-btn">← All quizzes</button>
    <button class="res-btn secondary" id="review-btn">${state.showReview ? 'Hide review' : 'Review all answers'}</button>
  </div>
  ${reviewItems}`;
        }

        function bindResults() {
            document.getElementById('retry-btn').addEventListener('click', () => {
                const pool = state.originalPool.map(q => ({ ...q }));
                state.quiz = state.shuffleAtStart ? shuffleArr(pool) : pool;
                state.originalTotal = pool.length;
                state.idx = 0; state.answered = false; state.skipped = false;
                state.userAnswer = ''; state.results = []; state.showReview = false; state.justSubmitted = false;
                state.lmsAnswers = {}; state.lmsReviewOpen = false; state.lmsMatchingStates = {}; state.lmsNavOpen = false;
                state.screen = 'quiz'; render();
            });
            document.getElementById('setup-btn').addEventListener('click', () => { state.screen = 'setup'; render(); });
            document.getElementById('index-btn').addEventListener('click', () => { window.location.href = 'index.html'; });
            document.getElementById('review-btn').addEventListener('click', () => { state.showReview = !state.showReview; render(); });
        }

        // =============================================================================
        // KEYBOARD SHORTCUTS
        // =============================================================================

        document.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            if (document.activeElement && document.activeElement.id === 'id-inp') return;
            if (document.activeElement && document.activeElement.id === 'lms-id-inp') return;
            if (document.activeElement && document.activeElement.classList.contains('enum-input')) return;
            if (state.screen === 'setup') {
                const sb = document.getElementById('start-btn');
                if (sb && !sb.disabled) sb.click();
            } else if (state.screen === 'quiz') {
                if (state.lmsMode) return; // LMS mode uses its own navigation
                const q = state.quiz[state.idx];
                if (state.answered || state.skipped) {
                    if (state.justSubmitted) { state.justSubmitted = false; return; }
                    const nb = document.getElementById('next-btn');
                    if (nb) nb.click();
                } else if (q && q.type === 'match') {
                    const ms = state.matchingState;
                    if (ms && Object.keys(ms.pairs).length === ms.left.length) {
                        const sb = document.getElementById('match-sub');
                        if (sb && !sb.disabled) sb.click();
                    }
                }
            } else if (state.screen === 'results') {
                const rb = document.getElementById('retry-btn');
                if (rb) rb.click();
            }
        });

        init();

        // Service Worker registration & updates
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                const btn = document.getElementById('update-btn');
                if (!btn) return;

                function showUpdateBtn() {
                    btn.classList.add('update-available');
                    btn.textContent = 'Update available! Click to reload';
                    btn.disabled = false;
                }

                // If there's already a waiting worker, show the update button immediately
                if (reg.waiting) {
                    showUpdateBtn();
                }

                // Monitor for updates
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed') {
                            if (navigator.serviceWorker.controller) {
                                showUpdateBtn();
                            }
                        }
                    });
                });

                btn.addEventListener('click', () => {
                    if (btn.classList.contains('update-available')) {
                        window.location.reload();
                        return;
                    }

                    btn.disabled = true;
                    btn.textContent = 'Checking...';
                    
                    let updateFound = false;
                    const checkTimeout = setTimeout(() => {
                        if (!updateFound) {
                            btn.textContent = 'Up to date!';
                            setTimeout(() => {
                                btn.disabled = false;
                                btn.textContent = 'Check for updates';
                            }, 2000);
                        }
                    }, 1500);

                    reg.update().catch(() => {
                        btn.disabled = false;
                        btn.textContent = 'Error checking updates';
                    });
                });
            }).catch(() => {});
        }
    </script>
</body>

</html>
